<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link type="text/css" rel="stylesheet" href="materialize/css/materialize.min.css" media="screen,projection"/>

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Detalhes de Eventos</title>
</head>
<body>

<h1>Lista de Eventos</h1>

<!-- Botão corrigido -->
<h3><a href="/evento" class="waves-effect waves-light btn">
    <i class="material-icons left">add</i>
        Lista de Evento</a></h3>
<div th:each="evento : ${evento}" class="container">
    <div class="row">
        <p>Nome: <span th:text="${evento.nome}"></span></p>
        <p>Local: <span th:text="${evento.local}"></span></p>
        <p>Data: <span th:text="${evento.data}"></span></p>
        <p>Horário: <span th:text="${evento.horario}"></span></p>
    </div>

    <form method="post">
        Nome: <input type="text" value="" name="nomeconvidado"/>
        Rg: <input type="text" value="" name="nomeconvidado"/>
        <button class="waves-effect waves-light btn" type="submit">Adicionar</button>
    </form>
</div>
<!--JavaScript at end of body for optimized loading-->
<script type="text/javascript" src="materialize/js/materialize.min.js"></script>
</body>
</html>
